<svg viewBox="0 0 1000 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated garden banner">
  <style>
    <![CDATA[
      .day { display: block; }
      .night { display: none; }
      @media (prefers-color-scheme: dark) {
        .day { display: none; }
        .night { display: block; }
      }

      .stem { fill: none; stroke-width: 2.5; }
      .day .stem { stroke: #94a3b8; }
      .night .stem { stroke: #475569; }

      @keyframes bloom {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.12); }
      }
      .flower { transform-box: fill-box; transform-origin: center; animation: bloom 4s ease-in-out infinite; }
      .flower.d2 { animation-delay: 1.3s; }
      .flower.d3 { animation-delay: 2.6s; }

      @keyframes flap {
        0%, 100% { transform: scaleX(1); }
        50% { transform: scaleX(0.25); }
      }
      .wing { transform-box: fill-box; transform-origin: center; animation: flap 0.6s ease-in-out infinite; }
      .night .wing { animation-duration: 1.3s; }

      @keyframes flyA {
        0%   { transform: translate(0px, 100px); }
        25%  { transform: translate(260px, 25px); }
        50%  { transform: translate(520px, 115px); }
        75%  { transform: translate(760px, 20px); }
        100% { transform: translate(1000px, 95px); }
      }
      @keyframes flyB {
        0%   { transform: translate(1000px, 30px); }
        25%  { transform: translate(740px, 120px); }
        50%  { transform: translate(480px, 15px); }
        75%  { transform: translate(220px, 110px); }
        100% { transform: translate(0px, 35px); }
      }
      .fly-a { animation: flyA 13s linear infinite; }
      .fly-b { animation: flyB 16s linear infinite; }
      .fly-a.offset { animation-delay: -6.5s; }
      .fly-b.offset { animation-delay: -8s; }

      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 1; }
      }
      .firefly { animation: twinkle 2.4s ease-in-out infinite; }
    ]]>
  </style>

  <!-- Day scene: butterflies and blooming flowers -->
  <g class="day">
    <path class="stem" d="M120,160 Q117,105 120,60"/>
    <path class="stem" d="M500,160 Q497,100 500,55"/>
    <path class="stem" d="M860,160 Q857,105 860,60"/>

    <g class="flower" transform="translate(120,55)">
      <g fill="#f0abfc">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#f59e0b"/>
    </g>
    <g class="flower d2" transform="translate(500,50)">
      <g fill="#fda4af">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#f59e0b"/>
    </g>
    <g class="flower d3" transform="translate(860,55)">
      <g fill="#c4b5fd">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#f59e0b"/>
    </g>

    <g class="fly-a">
      <g class="wing" fill="#f472b6">
        <path d="M0,0 C-16,-20 -16,-3 0,5 Z"/>
        <path d="M0,0 C16,-20 16,-3 0,5 Z"/>
      </g>
      <line x1="0" y1="-5" x2="0" y2="7" stroke="#475569" stroke-width="1.5"/>
    </g>
    <g class="fly-b">
      <g class="wing" fill="#c4b5fd">
        <path d="M0,0 C-14,-17 -14,-2 0,4 Z"/>
        <path d="M0,0 C14,-17 14,-2 0,4 Z"/>
      </g>
      <line x1="0" y1="-4" x2="0" y2="6" stroke="#475569" stroke-width="1.5"/>
    </g>
    <g class="fly-a offset">
      <g class="wing" fill="#fbbf24">
        <path d="M0,0 C-13,-16 -13,-2 0,4 Z"/>
        <path d="M0,0 C13,-16 13,-2 0,4 Z"/>
      </g>
      <line x1="0" y1="-4" x2="0" y2="6" stroke="#475569" stroke-width="1.5"/>
    </g>
    <g class="fly-b offset">
      <g class="wing" fill="#34d399">
        <path d="M0,0 C-14,-17 -14,-2 0,4 Z"/>
        <path d="M0,0 C14,-17 14,-2 0,4 Z"/>
      </g>
      <line x1="0" y1="-4" x2="0" y2="6" stroke="#475569" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Night scene: moths, moonflowers, fireflies -->
  <g class="night">
    <path class="stem" d="M120,160 Q117,105 120,60"/>
    <path class="stem" d="M500,160 Q497,100 500,55"/>
    <path class="stem" d="M860,160 Q857,105 860,60"/>

    <g class="flower" transform="translate(120,55)">
      <circle r="16" fill="#818cf8" opacity="0.3"/>
      <g fill="#a5b4fc" opacity="0.9">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#e2e8f0"/>
    </g>
    <g class="flower d2" transform="translate(500,50)">
      <circle r="16" fill="#818cf8" opacity="0.3"/>
      <g fill="#a5b4fc" opacity="0.9">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#e2e8f0"/>
    </g>
    <g class="flower d3" transform="translate(860,55)">
      <circle r="16" fill="#818cf8" opacity="0.3"/>
      <g fill="#a5b4fc" opacity="0.9">
        <ellipse cx="0" cy="-11" rx="7" ry="12"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" transform="rotate(288)"/>
      </g>
      <circle r="7" fill="#e2e8f0"/>
    </g>

    <g class="fly-a">
      <g class="wing" fill="#818cf8" opacity="0.85">
        <path d="M0,0 C-15,-18 -15,-3 0,4 Z"/>
        <path d="M0,0 C15,-18 15,-3 0,4 Z"/>
      </g>
      <line x1="0" y1="-4" x2="0" y2="6" stroke="#cbd5e1" stroke-width="1.5"/>
    </g>
    <g class="fly-b offset">
      <g class="wing" fill="#a5b4fc" opacity="0.8">
        <path d="M0,0 C-13,-16 -13,-2 0,4 Z"/>
        <path d="M0,0 C13,-16 13,-2 0,4 Z"/>
      </g>
      <line x1="0" y1="-4" x2="0" y2="6" stroke="#cbd5e1" stroke-width="1.5"/>
    </g>

    <circle class="firefly" cx="230" cy="95" r="2.5" fill="#fde68a"/>
    <circle class="firefly" cx="600" cy="35" r="2" fill="#fde68a" style="animation-delay:0.8s"/>
    <circle class="firefly" cx="760" cy="105" r="2.5" fill="#fde68a" style="animation-delay:1.6s"/>
    <circle class="firefly" cx="380" cy="125" r="2" fill="#fde68a" style="animation-delay:2.2s"/>
    <circle class="firefly" cx="920" cy="70" r="2" fill="#fde68a" style="animation-delay:1.1s"/>
  </g>
</svg>
